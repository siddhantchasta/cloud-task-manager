services:
  auth-service:
    build: ./services/auth-service
    ports:
      - "5001:5001"
    volumes:
      - ./services/auth-service:/app
    environment:
      PORT: 5001
      MONGO_URI: mongodb://mongo:27017/taskmanager
    depends_on:
      - mongo
      - redis

  task-service:
    build: ./services/task-service
    ports:
      - "5002:5002"
    volumes:
      - ./services/task-service:/app
    environment:
      PORT: 5002
      MONGO_URI: mongodb://mongo:27017/taskmanager
    depends_on:
      - mongo
      - redis

  api-gateway:
    build: ./services/api-gateway
    ports:
      - "5003:5003"
    depends_on:
      - auth-service
      - task-service

  mongo:
    image: mongo
    ports:
      - "27017:27017"

  redis:
    image: redis
    ports:
      - "6379:6379"

  notification-service:
    build: ./services/notification-service
    depends_on:
      - redis